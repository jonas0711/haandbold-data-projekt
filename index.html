<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Håndbold Scoreboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <button class="play-button"></button>
        <div class="team">Hjemmehold</div>
        <div class="score">0 - 0</div>
        <div class="team">Udehold</div>
    </div>
    <div class="time">00:00</div>
    
    <div class="columns">
        <div class="column">
            <div class="column-header">
                <label>Målvogter</label>
                <select>
                    <option>Vælg spiller</option>
                </select>
            </div>
            <div class="defense-system">
                <div class="defense-buttons">
                    <input type="radio" id="home-60" name="home-defense" value="6:0" checked>
                    <label for="home-60">6:0</label>
                    <input type="radio" id="home-51" name="home-defense" value="5:1">
                    <label for="home-51">5:1</label>
                    <input type="radio" id="home-42" name="home-defense" value="4:2">
                    <label for="home-42">4:2</label>
                    <input type="radio" id="home-33" name="home-defense" value="3:3">
                    <label for="home-33">3:3</label>
                    <input type="radio" id="home-321" name="home-defense" value="3:2:1">
                    <label for="home-321">3:2:1</label>
                </div>
            </div>
            <div class="players-section">
                <div class="players-grid player-buttons">
                    <input type="radio" id="home-player-1" name="home-player" value="1">
                    <label for="home-player-1">1</label>
                    <input type="radio" id="home-player-2" name="home-player" value="2">
                    <label for="home-player-2">2</label>
                    <input type="radio" id="home-player-3" name="home-player" value="3">
                    <label for="home-player-3">3</label>
                    <input type="radio" id="home-player-4" name="home-player" value="4">
                    <label for="home-player-4">4</label>
                    <input type="radio" id="home-player-5" name="home-player" value="5">
                    <label for="home-player-5">5</label>
                    <input type="radio" id="home-player-6" name="home-player" value="6">
                    <label for="home-player-6">6</label>
                    <input type="radio" id="home-player-7" name="home-player" value="7">
                    <label for="home-player-7">7</label>
                    <input type="radio" id="home-player-8" name="home-player" value="8">
                    <label for="home-player-8">8</label>
                    <input type="radio" id="home-player-9" name="home-player" value="9">
                    <label for="home-player-9">9</label>
                    <input type="radio" id="home-player-10" name="home-player" value="10">
                    <label for="home-player-10">10</label>
                    <input type="radio" id="home-player-11" name="home-player" value="11">
                    <label for="home-player-11">11</label>
                    <input type="radio" id="home-player-12" name="home-player" value="12">
                    <label for="home-player-12">12</label>
                </div>
            </div>
            <div class="attack-section">
                <div class="section-header">
                    <span class="section-title">Angrebsåbninger</span>
                    <button class="add-button">Tilføj</button>
                </div>
                <div class="attack-options">
                    <button class="attack-option active">Frit Spil</button>
                </div>
            </div>
        </div>
        
        <div class="column middle-column">
            <div class="sections">
                <!-- Ny Sektion: Spørgsmål til Mål -->
                <div class="section" id="goal-questions" style="display: none;">
                    <h3>Målspecifikation</h3>
                    <div class="switch-container">
                        <label for="parade-switch">Var der parade?</label>
                        <label class="switch">
                            <input type="checkbox" id="parade-switch">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="question-container">
                        <!-- Spørgsmål 1 -->
                        <div class="question" data-question="1">
                            <p>Zoner for positioner:</p>
                            <div class="options">
                                <button class="option-button">1</button>
                                <button class="option-button">2 (6-9m)</button>
                                <button class="option-button">2 (9+m)</button>
                                <button class="option-button">3 (6-9m)</button>
                                <button class="option-button">3 (9+m)</button>
                                <button class="option-button">4 (6-9m)</button>
                                <button class="option-button">4 (9+m)</button>
                                <button class="option-button">5 (6-9m)</button>
                                <button class="option-button">5 (9+m)</button>
                                <button class="option-button">6</button>
                            </div>
                        </div>
                        <!-- Spørgsmål 2 -->
                        <div class="question" data-question="2" style="display: none;">
                            <p>Skudtyper:</p>
                            <div class="options">
                                <button class="option-button">Gennembrud</button>
                                <button class="option-button">Hopskud</button>
                                <button class="option-button">Stående Skud</button>
                                <button class="option-button">Underhånd</button>
                                <button class="option-button">Stregskud</button>
                                <button class="option-button">Frit Gennemløb</button>
                            </div>
                        </div>
                        <!-- Spørgsmål 3 -->
                        <div class="question" data-question="3" style="display: none;">
                            <p>Placering i målet:</p>
                            <div class="options">
                                <button class="option-button">Venstre Bund</button>
                                <button class="option-button">Venstre Midt</button>
                                <button class="option-button">Venstre Top</button>
                                <button class="option-button">Midt Bund</button>
                                <button class="option-button">Midt Midt</button>
                                <button class="option-button">Midt Top</button>
                                <button class="option-button">Højre Bund</button>
                                <button class="option-button">Højre Midt</button>
                                <button class="option-button">Højre Top</button>
                            </div>
                        </div>
                        <!-- Spørgsmål 4 -->
                        <div class="question" data-question="4" style="display: none;">
                            <p>Assist:</p>
                            <div class="options">
                                <button class="option-button">Ingen</button>
                                <!-- Dynamisk genererede assist-knapper baseret på spillernumre -->
                                <!-- Eksempel: -->
                                <button class="option-button">1</button>
                                <button class="option-button">2</button>
                                <button class="option-button">3</button>
                                <!-- Tilføj flere knapper efter behov -->
                            </div>
                        </div>
                        <!-- Spørgsmål 5 -->
                        <div class="question" data-question="5" style="display: none;">
                            <p>Var der en forsvarsfejl?</p>
                            <div class="options">
                                <button class="option-button">Ingen</button>
                                <button class="option-button">Højde</button>
                                <button class="option-button">Tællefejl</button>
                                <button class="option-button" id="add-fault">Tilføj fejl</button>
                            </div>
                            <!-- Formular til at tilføje fejl, skjult som standard -->
                            <div class="add-fault-form" style="display: none; margin-top: 10px;">
                                <input type="text" id="fault-description" placeholder="Beskriv fejlen">
                                <button class="submit-fault-button">Indsend</button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Slut på ny Sektion -->
                
                <div class="section">
                    <h3>Fase</h3>
                    <div class="phase-selection">
                        <input type="radio" id="stationaer-angreb" name="fase" value="Stationært Angreb" checked>
                        <label for="stationaer-angreb">Stationært Angreb</label>

                        <input type="radio" id="andens-bolge" name="fase" value="2. Bølge">
                        <label for="andens-bolge">2. Bølge</label>

                        <input type="radio" id="første-bolge" name="fase" value="1. Bølge">
                        <label for="første-bolge">1. Bølge</label>
                    </div>
                </div>
                <div class="section">
                    <h3>Handlinger</h3>
                    <div class="action-buttons">
                        <button class="action-button">Mål</button>
                        <button class="action-button">Skud reddet</button>
                        <button class="action-button">Skud på stolpe</button>
                        <button class="action-button">Skud forbi</button>
                        <button class="action-button">Skud blokeret</button>
                    </div>
                </div>
                <div class="section">
                    <h3>Overtrædelser</h3>
                    <div class="violation-buttons">
                        <button class="violation-button">Fejlaflevering</button>
                        <button class="violation-button">Tabt bold</button>
                        <button class="violation-button">Regelfejl</button>
                        <button class="violation-button">Tilkendt straffe</button>
                    </div>
                </div>
                <div class="section">
                    <h3>Disciplinære Handlinger</h3>
                    <div class="disciplinary-buttons">
                        <button class="disciplinary-button">Udvisning</button>
                        <button class="disciplinary-button">Gult kort</button>
                        <button class="disciplinary-button">Rødt kort</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="column">
            <div class="column-header">
                <label>Målvogter</label>
                <select>
                    <option>Vælg spiller</option>
                </select>
            </div>
            <div class="defense-system">
                <div class="defense-buttons">
                    <input type="radio" id="away-60" name="away-defense" value="6:0" checked>
                    <label for="away-60">6:0</label>
                    <input type="radio" id="away-51" name="away-defense" value="5:1">
                    <label for="away-51">5:1</label>
                    <input type="radio" id="away-42" name="away-defense" value="4:2">
                    <label for="away-42">4:2</label>
                    <input type="radio" id="away-33" name="away-defense" value="3:3">
                    <label for="away-33">3:3</label>
                    <input type="radio" id="away-321" name="away-defense" value="3:2:1">
                    <label for="away-321">3:2:1</label>
                </div>
            </div>
            <div class="players-section">
                <div class="players-grid player-buttons">
                    <input type="radio" id="away-player-1" name="away-player" value="1">
                    <label for="away-player-1">1</label>
                    <input type="radio" id="away-player-2" name="away-player" value="2">
                    <label for="away-player-2">2</label>
                    <input type="radio" id="away-player-3" name="away-player" value="3">
                    <label for="away-player-3">3</label>
                    <input type="radio" id="away-player-4" name="away-player" value="4">
                    <label for="away-player-4">4</label>
                    <input type="radio" id="away-player-5" name="away-player" value="5">
                    <label for="away-player-5">5</label>
                    <input type="radio" id="away-player-6" name="away-player" value="6">
                    <label for="away-player-6">6</label>
                    <input type="radio" id="away-player-7" name="away-player" value="7">
                    <label for="away-player-7">7</label>
                    <input type="radio" id="away-player-8" name="away-player" value="8">
                    <label for="away-player-8">8</label>
                    <input type="radio" id="away-player-9" name="away-player" value="9">
                    <label for="away-player-9">9</label>
                    <input type="radio" id="away-player-10" name="away-player" value="10">
                    <label for="away-player-10">10</label>
                    <input type="radio" id="away-player-11" name="away-player" value="11">
                    <label for="away-player-11">11</label>
                    <input type="radio" id="away-player-12" name="away-player" value="12">
                    <label for="away-player-12">12</label>
                </div>
            </div>
            <div class="attack-section">
                <div class="section-header">
                    <span class="section-title">Angrebsåbninger</span>
                    <button class="add-button">Tilføj</button>
                </div>
                <div class="attack-options">
                    <button class="attack-option active">Frit Spil</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Player selection/deselection handling
            document.querySelectorAll('.player-buttons input[type="radio"]').forEach(radio => {
                radio.addEventListener('click', function(e) {
                    if (this.dataset.lastChecked === 'true') {
                        this.checked = false;
                        this.dataset.lastChecked = false;
                    } else {
                        const name = this.name;
                        document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
                            r.dataset.lastChecked = false;
                        });
                        this.dataset.lastChecked = true;
                    }
                });
            });

            // Attack option selection
            document.querySelectorAll('.attack-option').forEach(option => {
                option.addEventListener('click', function() {
                    const parent = this.closest('.attack-options');
                    parent.querySelectorAll('.attack-option').forEach(opt => {
                        opt.classList.remove('active');
                    });
                    this.classList.add('active');
                    
                    // Hvis "Mål" trykkes, vis spørgsmålsektionen
                    if (this.textContent.trim() === 'Mål') {
                        showGoalQuestions();
                    } else {
                        hideGoalQuestions();
                    }
                });
            });

            // Add new attack option
            document.querySelectorAll('.add-button').forEach(button => {
                button.addEventListener('click', function() {
                    const name = prompt('Indtast navn på ny angrebsåbning:');
                    if (name) {
                        const optionsContainer = this.closest('.attack-section')
                            .querySelector('.attack-options');
                        const newOption = document.createElement('button');
                        newOption.className = 'attack-option';
                        newOption.textContent = name;
                        newOption.addEventListener('click', function() {
                            optionsContainer.querySelectorAll('.attack-option')
                                .forEach(opt => opt.classList.remove('active'));
                            this.classList.add('active');
                            
                            if (this.textContent.trim() === 'Mål') {
                                showGoalQuestions();
                            } else {
                                hideGoalQuestions();
                            }
                        });
                        optionsContainer.appendChild(newOption);
                    }
                });
            });

            // Handling for action buttons in Sektion 2
            document.querySelectorAll('.action-button').forEach(button => {
                button.addEventListener('click', function() {
                    if (this.textContent.trim() === 'Mål') {
                        showGoalQuestions();
                    } else {
                        alert(`Du har trykket på: ${this.textContent}`);
                        // Her kan du tilføje yderligere funktionalitet, fx opdatere score
                    }
                });
            });

            // Handling for violation buttons in Sektion 3
            document.querySelectorAll('.violation-button').forEach(button => {
                button.addEventListener('click', function() {
                    alert(`Du har trykket på: ${this.textContent}`);
                    // Her kan du tilføje yderligere funktionalitet, fx registrere overtrædelse
                });
            });

            // Handling for disciplinary buttons in Sektion 4
            document.querySelectorAll('.disciplinary-button').forEach(button => {
                button.addEventListener('click', function() {
                    alert(`Du har trykket på: ${this.textContent}`);
                    // Her kan du tilføje yderligere funktionalitet, fx registrere disciplinær handling
                });
            });

            // Goal Questions Handling
            const goalQuestions = document.getElementById('goal-questions');
            const switchParade = document.getElementById('parade-switch');
            const questions = goalQuestions.querySelectorAll('.question');
            let currentQuestion = 0;
            let parade = false;
            let assistPlayer = null;
            let addedFault = null;

            function showGoalQuestions() {
                goalQuestions.style.display = 'block';
                currentQuestion = 0;
                parade = false;
                assistPlayer = null;
                addedFault = null;
                switchParade.checked = false;
                questions.forEach(q => q.style.display = 'none');
                questions[0].style.display = 'block';
            }

            function hideGoalQuestions() {
                goalQuestions.style.display = 'none';
            }

            // Event listeners for questions
            questions.forEach(question => {
                const buttons = question.querySelectorAll('.option-button');
                buttons.forEach(button => {
                    button.addEventListener('click', function() {
                        // Håndter svar baseret på spørgsmålet
                        const qNumber = parseInt(question.getAttribute('data-question'));
                        if (qNumber === 1) {
                            // Zoner for positioner
                            console.log(`Zonestatus valgt: ${this.textContent}`);
                        } else if (qNumber === 2) {
                            // Skudtyper
                            console.log(`Skudtype valgt: ${this.textContent}`);
                        } else if (qNumber === 3) {
                            // Placering i målet
                            console.log(`Placering i målet valgt: ${this.textContent}`);
                        } else if (qNumber === 4) {
                            // Assist
                            assistPlayer = this.textContent.trim();
                            console.log(`Assist valgt: ${assistPlayer}`);
                        } else if (qNumber === 5) {
                            // Var der en forsvarsfejl?
                            if (this.id === 'add-fault') {
                                // Vis formular til at tilføje fejl
                                question.querySelector('.add-fault-form').style.display = 'flex';
                            } else {
                                console.log(`Forsvarsfejl valgt: ${this.textContent}`);
                                proceedToNextQuestion();
                            }
                            return; // Stop videre for denne klik
                        }

                        proceedToNextQuestion();
                    });
                });
            });

            // Handling tilføj fejl
            const addFaultButton = document.getElementById('add-fault');
            const faultForm = addFaultButton.parentElement.querySelector('.add-fault-form');
            const faultDescriptionInput = document.getElementById('fault-description');
            const submitFaultButton = document.querySelector('.submit-fault-button');

            submitFaultButton.addEventListener('click', function() {
                const description = faultDescriptionInput.value.trim();
                if (description) {
                    addedFault = description;
                    console.log(`Tilføjet fejl: ${addedFault}`);
                    faultDescriptionInput.value = '';
                    faultForm.style.display = 'none';
                    proceedToNextQuestion();
                } else {
                    alert('Indtast venligst en beskrivelse af fejlen.');
                }
            });

            // Handling switch for parade
            switchParade.addEventListener('change', function() {
                parade = this.checked;
                console.log(`Var der parade? ${parade ? 'Ja' : 'Nej'}`);
            });

            function proceedToNextQuestion() {
                questions[currentQuestion].style.display = 'none';
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    questions[currentQuestion].style.display = 'block';
                } else {
                    // Alle spørgsmål besvaret
                    alert('Alle målspørgsmål er besvaret.');
                    hideGoalQuestions();
                    // Her kan du tilføje yderligere funktionalitet, fx gemme data
                }
            }
        });
    </script>
</body>
</html>
